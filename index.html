<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>旅行 POI 提取工具</title>
  <style>
    :root {
      --bg: #f7f8f4;
      --panel: #ffffff;
      --ink: #1d2522;
      --muted: #66716d;
      --line: #d9ded7;
      --soft: #eef2eb;
      --accent: #0f766e;
      --accent-2: #b45309;
      --danger: #b42318;
      --shadow: 0 16px 42px rgba(26, 38, 34, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    .app {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.08;
      font-weight: 760;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(340px, 0.9fr) minmax(640px, 1.35fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .input-panel {
      padding: 16px;
      position: sticky;
      top: 16px;
    }

    label {
      display: block;
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      outline: 0;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    textarea {
      min-height: 430px;
      padding: 13px;
      resize: vertical;
      line-height: 1.55;
    }

    input,
    select {
      min-height: 38px;
      padding: 8px 10px;
    }

    .city-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 14px;
      align-items: end;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 9px 13px;
      border-radius: 6px;
      color: #fff;
      background: var(--accent);
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn.secondary {
      background: #31413d;
    }

    .btn.light {
      background: var(--soft);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .btn.warn {
      background: var(--accent-2);
    }

    .btn.danger {
      background: #fff4f2;
      color: var(--danger);
      border: 1px solid #f1c3bd;
    }

    .btn.icon {
      width: 36px;
      min-height: 34px;
      padding: 0;
      font-size: 18px;
    }

    .result-panel {
      overflow: hidden;
    }

    .result-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .result-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 760;
    }

    .count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #e7f3ef;
      color: #0f5f59;
      font-size: 13px;
      font-weight: 780;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      text-align: left;
    }

    th {
      padding: 10px 8px;
      background: #f3f5f1;
      color: #4f5d58;
      font-size: 12px;
      font-weight: 760;
    }

    td {
      padding: 8px;
      background: #fff;
    }

    tbody tr:hover td {
      background: #fbfcf8;
    }

    td input,
    td select,
    td textarea {
      border-color: transparent;
      background: transparent;
      padding: 6px;
    }

    td textarea {
      min-height: 68px;
      resize: vertical;
      line-height: 1.45;
    }

    td input:focus,
    td select:focus,
    td textarea:focus {
      background: #fff;
      border-color: var(--accent);
    }

    .col-name {
      width: 16%;
    }

    .col-area {
      width: 13%;
    }

    .col-type {
      width: 10%;
    }

    .col-reason {
      width: 21%;
    }

    .col-clue {
      width: 21%;
    }

    .col-link {
      width: 12%;
    }

    .col-row-actions {
      width: 7%;
    }

    .map-link {
      width: 100%;
      min-height: 34px;
      padding: 7px 9px;
      font-size: 13px;
    }

    .empty {
      padding: 46px 22px;
      color: var(--muted);
      text-align: center;
      border-top: 1px solid var(--line);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 980px) {
      .app {
        width: min(100vw - 20px, 760px);
        padding-top: 18px;
      }

      header,
      .workspace,
      .city-row {
        display: block;
      }

      .status {
        margin-top: 8px;
        white-space: normal;
      }

      .input-panel {
        position: static;
        margin-bottom: 14px;
      }

      .city-row button {
        margin-top: 10px;
        width: 100%;
      }

      textarea {
        min-height: 300px;
      }

      .result-toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .actions .btn,
      #openAllBtn {
        width: 100%;
      }
    }

    @media (max-width: 720px) {
      body {
        background: #fff;
      }

      .app {
        width: 100%;
        padding: 14px 10px 26px;
      }

      h1 {
        font-size: 28px;
      }

      .panel {
        border-radius: 0;
        box-shadow: none;
      }

      .input-panel,
      .result-toolbar {
        padding: 12px;
      }

      textarea {
        min-height: 260px;
      }

      .table-wrap {
        overflow: visible;
        padding: 10px;
        background: #f5f7f2;
      }

      table,
      tbody,
      tr,
      td {
        display: block;
        width: 100%;
      }

      table {
        min-width: 0;
        border-collapse: separate;
        border-spacing: 0;
      }

      thead {
        display: none;
      }

      tbody tr {
        margin-bottom: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      td {
        display: grid;
        grid-template-columns: 84px minmax(0, 1fr);
        gap: 10px;
        padding: 10px;
        border-bottom: 1px solid var(--line);
        align-items: start;
      }

      td:last-child {
        border-bottom: 0;
      }

      td::before {
        content: attr(data-label);
        padding-top: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 760;
      }

      td input,
      td select,
      td textarea {
        border-color: var(--line);
        background: #fff;
      }

      td textarea {
        min-height: 76px;
      }

      .map-link,
      .btn.icon {
        width: 100%;
      }

      .btn.icon {
        min-height: 38px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>旅行 POI 提取工具</h1>
      <div class="status" id="saveStatus">已准备</div>
    </header>

    <section class="workspace">
      <div class="panel input-panel">
        <label for="sourceText">旅行攻略正文</label>
        <textarea id="sourceText" placeholder="粘贴小红书、博客或攻略正文..."></textarea>

        <div class="city-row">
          <div>
            <label for="cityInput">城市，可选</label>
            <input id="cityInput" type="text" placeholder="Paris、Tokyo、Kyoto">
          </div>
          <button class="btn" id="extractBtn" type="button">提取 POI</button>
        </div>

        <div class="actions">
          <button class="btn light" id="sampleBtn" type="button">填入示例</button>
          <button class="btn secondary" id="addBtn" type="button">新增 POI</button>
          <button class="btn warn" id="csvBtn" type="button">导出 CSV</button>
          <button class="btn danger" id="clearBtn" type="button">清空</button>
        </div>
      </div>

      <div class="panel result-panel">
        <div class="result-toolbar">
          <div class="result-title">
            <span>结果表格</span>
            <span class="count" id="poiCount">0</span>
          </div>
          <button class="btn light" id="openAllBtn" type="button">打开全部链接</button>
        </div>

        <div class="table-wrap" id="tableWrap">
          <table>
            <thead>
              <tr>
                <th class="col-name">POI 名称</th>
                <th class="col-area">城市/区域</th>
                <th class="col-type">类型</th>
                <th class="col-reason">推荐理由</th>
                <th class="col-clue">原文线索</th>
                <th class="col-link">Google Maps 链接</th>
                <th class="col-row-actions">操作</th>
              </tr>
            </thead>
            <tbody id="poiBody"></tbody>
          </table>
        </div>
        <div class="empty" id="emptyState">暂无 POI</div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "travel-poi-extractor-v1";
    const TYPES = ["咖啡", "餐厅", "景点", "酒店", "购物", "其他"];
    const TYPE_KEYWORDS = [
      ["咖啡", ["咖啡", "cafe", "café", "coffee", "拿铁", "烘焙", "甜品", "蛋糕"]],
      ["餐厅", ["餐厅", "饭店", "食堂", "早餐", "朝ごはん", "橙汁", "果汁", "brunch", "bistro", "bistrò", "restaurant", "diner", "osteria", "pizzeria", "trattoria", "pizza", "grill", "料理", "午餐", "晚餐", "面包店", "酒吧", "bar"]],
      ["酒店", ["酒店", "hotel", "民宿", "住宿", "旅馆", "resort"]],
      ["购物", ["购物", "商场", "百货", "买手店", "古着", "书店", "市集", "market", "boutique", "shop"]],
      ["景点", ["景点", "博物馆", "美术馆", "小巷", "石阶", "公园", "花园", "教堂", "神社", "寺", "宫", "塔", "广场", "museum", "garden"]]
    ];
    const AREA_PATTERNS = [
      /(Châtelet\s*-\s*Les Halles|Rue Saint-Honoré|Marais|Le Marais|Shibuya|Shinjuku|Ginza|Harajuku|Montmartre|Louvre)/i,
      /([A-Za-zÀ-ÿ'’.\-\s]+(?:Street|St\.|Rue|Avenue|Ave\.|Road|Rd\.|Lane|Plaza|Square|Market))/i,
      /([\u4e00-\u9fa5A-Za-zÀ-ÿ'’.\-\s]+(?:区|街|附近|周边|路|广场|商圈|车站|花园|公园|宫|馆|站))/
    ];
    const SAMPLE_TEXT = `🤍Partisan Café Artisanal
玛黑区的时髦人有一半都在这家咖啡店，时尚浓度超高。

🤍Cafe Verlet
1880年营业至今的百年咖啡馆，坐落在著名的Rue Saint-Honoré街，是巴黎最古老的自烘焙咖啡店之一。

🤍Motors Coffee
这家咖啡店的受众会比较年轻化，位置在Châtelet - Les Halles附近，是一间将机车元素、街头潮流完美融合的时尚咖啡馆。`;

    const sourceText = document.querySelector("#sourceText");
    const cityInput = document.querySelector("#cityInput");
    const saveStatus = document.querySelector("#saveStatus");
    const poiBody = document.querySelector("#poiBody");
    const poiCount = document.querySelector("#poiCount");
    const emptyState = document.querySelector("#emptyState");
    const tableWrap = document.querySelector("#tableWrap");

    let pois = [];

    function uid() {
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function cleanPoiName(line) {
      return line
        .replace(/^[\s\d一二三四五六七八九十]+[.)、．-]\s*/, "")
        .replace(/^[\s#*•·\-–—|｜>]+/, "")
        .replace(/^[^0-9A-Za-zÀ-ÿ\u3040-\u30ff\u3400-\u9fff]+/, "")
        .replace(/[：:，,。.!！?？\s]+$/, "")
        .trim();
    }

    function startsWithMarker(line) {
      return /^[^0-9A-Za-zÀ-ÿ\u3040-\u30ff\u3400-\u9fff\s]/.test(line);
    }

    function isNoiseLine(line) {
      const text = line.trim();
      if (!text) return true;
      if (/^\[[#＃].+\]\(https?:\/\/.+\)/.test(text)) return true;
      if (/^(?:[#＃][^\s#＃]+[\s]*)+$/.test(text)) return true;
      return !/[0-9A-Za-zÀ-ÿ\u3040-\u30ff\u3400-\u9fff]/.test(text);
    }

    function isSectionHeader(line) {
      const text = cleanPoiName(line).replace(/[：:]\s*$/, "");
      if (text.length > 28) return false;
      return /(清单|小店|景点|美食|咖啡|餐厅|酒店|购物|路线|打卡|推荐|收藏|附录|list)$/i.test(text);
    }

    function parseCaptionPoi(line) {
      const text = line.trim();
      const match = text.match(/^图[一二三四五六七八九十\d]+(?:图[一二三四五六七八九十\d]+)*(?:[-—~至到和、图一二三四五六七八九十\d]*)?[：:]\s*(.+)$/);
      if (!match) return null;

      const content = match[1].trim();
      const mixedAreaMatch = content.match(/^([A-ZÀ-Þ][A-Za-zÀ-ÿ'’.\-\s]{2,28})\s+([\u3400-\u9fff]{2,8})\s+(.{2,80})$/);
      if (mixedAreaMatch) {
        return {
          title: cleanPoiName(mixedAreaMatch[3]),
          area: `${mixedAreaMatch[2].trim()} / ${mixedAreaMatch[1].trim()}`
        };
      }

      const areaMatch = content.match(/^([\u3400-\u9fff]{2,8}|[A-ZÀ-Þ][A-Za-zÀ-ÿ'’.\-\s]{2,28})\s+(.{2,80})$/);
      if (areaMatch) {
        return {
          title: cleanPoiName(areaMatch[2]),
          area: areaMatch[1].trim()
        };
      }

      return {
        title: cleanPoiName(content),
        area: ""
      };
    }

    function looksLikeSentence(line) {
      const text = line.trim();
      if (/[。.!！?？]/.test(text)) return true;
      if (text.length > 24 && /[的了在是有和与就都也很超多不用可以看到随处最近由于去年那天]/.test(text)) return true;
      if (/^(这座|周末|日剧|列车|火车|不用|雨季|尾道有意思)/.test(text)) return true;
      return false;
    }

    function isShortPoiCandidate(line, nextLine, inListSection, startsBlock) {
      const cleaned = cleanPoiName(line);
      if (!inListSection || !startsBlock || !cleaned || cleaned.length > 42) return false;
      if (isSectionHeader(line) || isNoiseLine(line) || looksLikeSentence(cleaned)) return false;
      if (nextLine && isSectionHeader(nextLine)) return false;
      if (/^[0-9A-Za-zÀ-ÿ\u3040-\u30ff\u3400-\u9fff][0-9A-Za-zÀ-ÿ\u3040-\u30ff\u3400-\u9fff'’&.\-\s（）()・の]+$/.test(cleaned)) return true;
      return false;
    }

    function isPoiTitle(line) {
      const raw = line.trim();
      const cleaned = cleanPoiName(raw);
      if (!cleaned || cleaned.length > 54) return false;
      if (/^[\d一二三四五六七八九十]+[.)、．-]\s*\S+/.test(raw)) return true;
      if (/^[#*•·\-–—|｜>]/.test(raw)) return true;
      if (startsWithMarker(raw)) {
        if (looksLikeSentence(cleaned)) return false;
        if (/(很多|有点|不怎么|可以|看到|坐拥|满满|不用|随处|特别|可能|期待值)/.test(cleaned)) return false;
        return true;
      }
      if (/^[A-ZÀ-Þ][A-Za-zÀ-ÿ0-9'’&.\-\s]+$/.test(cleaned) && cleaned.split(/\s+/).length <= 6) return true;
      return false;
    }

    function classifyType(text) {
      const lower = text.toLowerCase();
      for (const [type, words] of TYPE_KEYWORDS) {
        if (words.some((word) => lower.includes(word.toLowerCase()))) return type;
      }
      return "其他";
    }

    function detectArea(text, city) {
      for (const pattern of AREA_PATTERNS) {
        const match = text.match(pattern);
        if (match && match[1]) {
          const area = match[1]
            .replace(/^(坐落在|位于|位置在|在|靠近|附近是|著名的)/, "")
            .replace(/附近$/, "")
            .replace(/[，,。.!！?？].*$/, "")
            .trim();
          if (area && city && !area.toLowerCase().includes(city.toLowerCase())) return `${area} / ${city}`;
          if (area) return area;
        }
      }
      return city || "";
    }

    function summarizeReason(name, type, description) {
      const text = description.replace(/\s+/g, " ").trim();
      if (!text) return name ? `${name} 值得顺路加入清单。` : "";
      const sentence = text.split(/[。.!！?？\n]/).find(Boolean) || text;
      const compact = sentence.length > 42 ? `${sentence.slice(0, 42)}...` : sentence;
      if (type === "咖啡") return `${compact}，适合安排咖啡休息。`;
      if (type === "餐厅") return `${compact}，适合加入用餐备选。`;
      if (type === "景点") return `${compact}，适合安排参观或散步。`;
      if (type === "酒店") return `${compact}，适合作为住宿参考。`;
      if (type === "购物") return `${compact}，适合加入逛街清单。`;
      return `${compact}，值得加入旅行清单。`;
    }

    function extractClue(text) {
      const candidates = text
        .split(/[，,。.!！?？、\n]/)
        .map((item) => item.trim())
        .filter((item) => item.length >= 2 && item.length <= 18);
      return candidates.slice(0, 4).join("、");
    }

    function mapUrl(poi) {
      const query = [poi.name, poi.area].filter(Boolean).join(" ");
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query).replace(/%20/g, "+")}`;
    }

    function parsePois(text, city) {
      const lines = text
        .replace(/\[[#＃][^\]]+\]\(https?:\/\/[^\)]+\)/g, "")
        .split(/\r?\n/)
        .map((line) => line.trim());
      const groups = [];
      let current = null;
      let inListSection = false;
      let startsBlock = true;

      for (let index = 0; index < lines.length; index += 1) {
        const trimmed = lines[index];
        const nextLine = lines[index + 1] || "";
        if (!trimmed || isNoiseLine(trimmed)) {
          startsBlock = true;
          continue;
        }

        if (isSectionHeader(trimmed)) {
          if (current) groups.push(current);
          current = null;
          inListSection = true;
          startsBlock = true;
          continue;
        }

        const captionPoi = parseCaptionPoi(trimmed);
        if (captionPoi && captionPoi.title) {
          if (current) groups.push(current);
          current = { title: captionPoi.title, area: captionPoi.area, lines: [] };
        } else if (isPoiTitle(trimmed) || isShortPoiCandidate(trimmed, nextLine, inListSection, startsBlock)) {
          if (current) groups.push(current);
          current = { title: cleanPoiName(trimmed), lines: [] };
        } else if (current) {
          current.lines.push(trimmed);
        }
        startsBlock = false;
      }
      if (current) groups.push(current);

      if (!groups.length) {
        const blocks = text
          .split(/\n\s*\n/)
          .map((block) => block.trim())
          .filter(Boolean);

        for (const block of blocks) {
          const blockLines = block.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
          const firstLine = blockLines[0] || "";
          const titleMatch = firstLine.match(/^(?:[\s#*•·\-–—|｜>\d一二三四五六七八九十.)、．]+)?([^，,。.!！?？：:]{2,54})(?:[：:，,。.!！?？]\s*)?(.*)$/);
          if (titleMatch) {
            const title = cleanPoiName(titleMatch[1]);
            const firstDescription = titleMatch[2] || "";
            if (title) groups.push({ title, lines: [firstDescription, ...blockLines.slice(1)].filter(Boolean) });
          }
        }
      }

      return groups
        .filter((group) => group.title)
        .map((group) => {
          const description = group.lines.join(" ");
          const fullText = `${group.title} ${description}`;
          const type = classifyType(fullText);
          return {
            id: uid(),
            name: group.title,
            area: group.area ? (city.trim() ? `${group.area} / ${city.trim()}` : group.area) : detectArea(description, city.trim()),
            type,
            reason: summarizeReason(group.title, type, description),
            clue: extractClue(description)
          };
        });
    }

    function render() {
      poiBody.innerHTML = "";
      poiCount.textContent = String(pois.length);
      emptyState.classList.toggle("hidden", pois.length > 0);
      tableWrap.classList.toggle("hidden", pois.length === 0);

      for (const poi of pois) {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td data-label="POI 名称"><input data-field="name" value="${escapeHtml(poi.name)}" aria-label="POI 名称"></td>
          <td data-label="城市/区域"><input data-field="area" value="${escapeHtml(poi.area)}" aria-label="城市或区域"></td>
          <td data-label="类型">
            <select data-field="type" aria-label="类型">
              ${TYPES.map((type) => `<option value="${type}" ${type === poi.type ? "selected" : ""}>${type}</option>`).join("")}
            </select>
          </td>
          <td data-label="推荐理由"><textarea data-field="reason" aria-label="推荐理由">${escapeHtml(poi.reason)}</textarea></td>
          <td data-label="原文线索"><textarea data-field="clue" aria-label="原文线索">${escapeHtml(poi.clue)}</textarea></td>
          <td data-label="地图链接"><a class="btn map-link" href="${mapUrl(poi)}" target="_blank" rel="noopener">Google Maps</a></td>
          <td data-label="操作"><button class="btn danger icon" type="button" title="删除" aria-label="删除 POI">×</button></td>
        `;

        row.querySelectorAll("[data-field]").forEach((field) => {
          field.addEventListener("input", () => {
            poi[field.dataset.field] = field.value;
            row.querySelector(".map-link").href = mapUrl(poi);
            persist();
          });
        });

        row.querySelector(".danger").addEventListener("click", () => {
          pois = pois.filter((item) => item.id !== poi.id);
          render();
          persist();
        });

        poiBody.appendChild(row);
      }
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        text: sourceText.value,
        city: cityInput.value,
        pois
      }));
      saveStatus.textContent = `已保存 ${new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })}`;
    }

    function loadSaved() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        sourceText.value = data.text || "";
        cityInput.value = data.city || "";
        pois = Array.isArray(data.pois) ? data.pois : [];
        render();
        saveStatus.textContent = "已恢复上次内容";
      } catch {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function addBlankPoi() {
      const city = cityInput.value.trim();
      pois.push({
        id: uid(),
        name: "",
        area: city,
        type: "其他",
        reason: "",
        clue: ""
      });
      render();
      persist();
    }

    function downloadCsv() {
      const headers = ["POI 名称", "城市/区域", "类型", "推荐理由", "原文线索", "Google Maps 链接"];
      const rows = pois.map((poi) => [poi.name, poi.area, poi.type, poi.reason, poi.clue, mapUrl(poi)]);
      const csv = [headers, ...rows].map((row) => row.map(csvCell).join(",")).join("\n");
      const blob = new Blob([`\ufeff${csv}`], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `travel-poi-${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function csvCell(value) {
      return `"${String(value || "").replaceAll('"', '""')}"`;
    }

    document.querySelector("#extractBtn").addEventListener("click", () => {
      const extracted = parsePois(sourceText.value, cityInput.value);
      pois = extracted.length ? extracted : pois;
      render();
      persist();
      saveStatus.textContent = extracted.length ? `已提取 ${extracted.length} 个 POI` : "未识别到新 POI";
    });

    document.querySelector("#sampleBtn").addEventListener("click", () => {
      sourceText.value = SAMPLE_TEXT;
      cityInput.value = cityInput.value || "Paris";
      persist();
    });

    document.querySelector("#addBtn").addEventListener("click", addBlankPoi);
    document.querySelector("#csvBtn").addEventListener("click", downloadCsv);

    document.querySelector("#clearBtn").addEventListener("click", () => {
      sourceText.value = "";
      cityInput.value = "";
      pois = [];
      localStorage.removeItem(STORAGE_KEY);
      render();
      saveStatus.textContent = "已清空";
    });

    document.querySelector("#openAllBtn").addEventListener("click", () => {
      pois.forEach((poi) => {
        if (poi.name.trim()) window.open(mapUrl(poi), "_blank", "noopener");
      });
    });

    sourceText.addEventListener("input", persist);
    cityInput.addEventListener("input", persist);

    loadSaved();
    render();
  </script>
</body>
</html>
